name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # triggers on every push to main
  workflow_dispatch: # allows manual trigger from GitHub UI

# Sets permissions so the workflow can write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; skip queued runs but don't cancel in-progress ones
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Next.js static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          # Tell Next.js to skip image optimisation (required for static export)
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # next build with output:'export' writes to ./out
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
